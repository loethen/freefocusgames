<!DOCTYPE html>
<html>
<head>
<style>
  @keyframes swim-tail {
      0%, 100% { transform: rotateY(-50deg); }
      50% { transform: rotateY(50deg); }
  }
  .container {
      position: relative;
      width: 200px;
      height: 200px;
      perspective: 400px;
      transform-style: preserve-3d;
  }
  .tail-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform-origin: 25px 50px;
      animation: swim-tail 0.8s infinite ease-in-out;
      z-index: 1;
  }
  .body-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
  }
</style>
</head>
<body>
  <div class="container">
      <div class="tail-wrapper">
          <svg viewBox="0 0 100 100" width="100%" height="100%">
              <path d="M25 50 L5 30 Q10 50 5 70 Z" fill="red" />
          </svg>
      </div>
      <div class="body-wrapper">
          <svg viewBox="0 0 100 100" width="100%" height="100%">
              <ellipse cx="55" cy="50" rx="35" ry="28" fill="blue" opacity="0.8" />
          </svg>
      </div>
  </div>
</body>
</html>
